<!DOCTYPE html>
<html>
<head>
<style>
  table {
    border-collapse: collapse;
    width: 50%;
    margin: 20px;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
    vertical-align: middle; /* Aligns content in the middle of the cell */
  }
  th {
    background-color: #f2f2f2;
  }
  /* Optional: Style the SVG within the table cell */
  .icon-svg {
    width: 50px;
    height: 50px;
  }
</style>
</head>
<body style="background-color:#444444;">

<h2>Table of SVGs</h2>

<table>
  <thead>
    <tr>
      <th>Shape Type</th>
      <th>SVG Graphic</th>
      <th>Description</th>
    </tr>
  </thead>

        <defs>
